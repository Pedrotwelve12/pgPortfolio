<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <title>Pedro Gil | Full Stack Developer</title>

    <!-- SEO -->
    <meta name="description" content="Full Stack Developer specializing in React, Node.js, TypeScript and AWS cloud solutions. Based in Guatemala." />
    <meta name="author" content="Pedro Rodolfo Gil Alfaro" />
    <meta name="keywords" content="Full Stack Developer, React, Node.js, TypeScript, AWS, Guatemala, Software Engineer" />

    <!-- Open Graph -->
    <meta property="og:title" content="Pedro Gil | Full Stack Developer" />
    <meta property="og:description" content="Full Stack Developer with 4+ years building scalable web applications with React, Node.js and AWS." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://Pedrotwelve12.github.io/pgPortfolio/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pedro Gil | Full Stack Developer" />
    <meta name="twitter:description" content="Self-taught Full Stack Developer — React, Node.js, TypeScript, AWS." />

    <!-- Security headers via meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.gpteng.co;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
        font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
        img-src 'self' data: https:;
        connect-src 'self';
        frame-ancestors 'none';
      "
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Dev icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/devicon@2.16.0/devicon.min.css"
    />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0a0a0a; }
      ::-webkit-scrollbar-thumb { background: #64ffda; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
